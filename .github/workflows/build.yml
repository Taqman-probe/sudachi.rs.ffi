name: Rust
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # 1. Rust のセットアップ
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 2. Rust のビルド (FFIライブラリ生成)
      - name: Build Rust Library
        run: cargo build --release

